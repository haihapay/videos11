<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Tool Clean</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body class="tool-page">

<div class="box">

    <h2>🎬 Video Tool (Clean)</h2>

    <input id="mp4" placeholder="MP4 URL">
    <input id="img" placeholder="Poster URL (optional)">

    <button id="btnGen">Generate</button>
    <button id="btnCopy">Copy</button>

    <!-- Embed Code -->
    <textarea id="output" readonly placeholder="Embed Code"></textarea>

    <!-- Result Link -->
    <div class="result-link">
        <input id="resultLink" type="text" readonly placeholder="Generated link">
        <button id="btnCopyLink">Copy Link</button>
    </div>

</div>

<script src="/videos/tool.js"></script>

</body>
</html>
