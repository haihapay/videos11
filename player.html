<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
</head>

<body>

<video id="video" controls autoplay style="width:100%;height:100%"></video>

<script>
(function () {

    function decode(token) {
        try {
            const base64 = token.replace(/-/g, "+").replace(/_/g, "/");
            const json = atob(base64);
            return JSON.parse(json);
        } catch (e) {
            return null;
        }
    }

    const params = new URLSearchParams(location.search);
    const token = params.get("url");

    const video = document.querySelector("video");

    if (!video) {
        document.body.innerHTML = "Video tag not found";
        return;
    }

    if (!token) {
        document.body.innerHTML = "Missing token";
        return;
    }

    const data = decode(token);

    if (!data) {
        document.body.innerHTML = "Decode error";
        return;
    }

    const url = data.u || data.url;
    const image = data.img || data.image || "";

    if (!url) {
        document.body.innerHTML = "Missing video URL";
        return;
    }

    console.log("VIDEO:", url);
    console.log("POSTER:", image);

    // set video
    video.src = url;

    // poster
    if (image) {
        video.poster = image;
    }

    // error handler (quan trọng)
    video.onerror = () => {
        document.body.innerHTML = `
            <h3>Unable to load video</h3>
            <p>Video may be blocked by host or not direct MP4</p>
            <p style="word-break:break-all">${url}</p>
        `;
    };

})();
</script>

</body>
</html>
