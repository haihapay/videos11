<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
</head>

<body>

<video id="video" controls autoplay style="width:100%;height:100%"></video>

<script>
function decodeToken(token) {
    const base64 = token.replace(/-/g, "+").replace(/_/g, "/");
    const json = atob(base64);
    return JSON.parse(json);
}

const params = new URLSearchParams(location.search);
const token = params.get("url");

if (!token) {
    document.body.innerHTML = "Missing video";
} else {

    try {

        const data = decodeToken(token);

        const url = data.u || data.url;

        if (!url) {
            document.body.innerHTML = "Invalid video url";
        } else {
            document.getElementById("video").src = url;
        }

    } catch (e) {
        document.body.innerHTML = "Decode error: " + e.message;
    }

}
</script>

</body>
</html>
